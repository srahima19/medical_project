<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Medical Diagnosis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary px-4">
  <span class="navbar-brand fw-bold">🏥 AI Medical Diagnosis</span>
  {% if user.is_authenticated %}
    <div class="d-flex gap-2">
      <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm">Dashboard</a>
      <a href="{% url 'predict' %}" class="btn btn-warning btn-sm">Check Symptoms</a>
      <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
    </div>
  {% endif %}
</nav>
<div class="container mt-4">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-info">{{ message }}</div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
